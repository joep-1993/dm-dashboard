services:
  app:
    container_name: content_top_app
    build: .
    ports:
      - "8003:8000"
    volumes:
      # Mount for live editing - no build needed!
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./thema_ads_optimized:/app/thema_ads_optimized
      - ./themes:/app/themes
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=postgresql://postgres:postgres@seo_tools_db:5432/seo_tools
      - USE_REDSHIFT_OUTPUT=${USE_REDSHIFT_OUTPUT:-false}
      - REDSHIFT_HOST=${REDSHIFT_HOST}
      - REDSHIFT_PORT=${REDSHIFT_PORT:-5439}
      - REDSHIFT_DB=${REDSHIFT_DB}
      - REDSHIFT_USER=${REDSHIFT_USER}
      - REDSHIFT_PASSWORD=${REDSHIFT_PASSWORD}
      - REDSHIFT_OUTPUT_SCHEMA=${REDSHIFT_OUTPUT_SCHEMA:-pa}
      - REDSHIFT_OUTPUT_TABLE=${REDSHIFT_OUTPUT_TABLE:-content_urls_joep}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - GOOGLE_DEVELOPER_TOKEN=${GOOGLE_DEVELOPER_TOKEN}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_LOGIN_CUSTOMER_ID=${GOOGLE_LOGIN_CUSTOMER_ID}
    networks:
      - seo-tools_default
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  seo-tools_default:
    external: true
