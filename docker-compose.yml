services:
  db:
    container_name: seo_tools_db
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=seo_tools
    ports:
      - "5433:5432"
    volumes:
      - seo_tools_postgres_data:/var/lib/postgresql/data
    networks:
      - seo-tools_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: dm_tools_app
    build: .
    ports:
      - "8003:8000"
    volumes:
      # Mount for live editing - no build needed!
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ../theme_ads/thema_ads_optimized:/app/thema_ads_optimized
      - ./themes:/app/themes
    depends_on:
      db:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=postgresql://dbadmin:Q9fGRKtUdvdtxsiCM12HeFe0Nki0PvmjZRFLZ9ArmlWdMnDQXX8SdxKnPniqGmq6@10.1.32.9:5432/n8n-vector-db
      - USE_REDSHIFT_OUTPUT=${USE_REDSHIFT_OUTPUT:-false}
      - REDSHIFT_HOST=${REDSHIFT_HOST}
      - REDSHIFT_PORT=${REDSHIFT_PORT:-5439}
      - REDSHIFT_DB=${REDSHIFT_DB}
      - REDSHIFT_USER=${REDSHIFT_USER}
      - REDSHIFT_PASSWORD=${REDSHIFT_PASSWORD}
      - REDSHIFT_OUTPUT_SCHEMA=${REDSHIFT_OUTPUT_SCHEMA:-pa}
      - REDSHIFT_OUTPUT_TABLE=${REDSHIFT_OUTPUT_TABLE:-content_urls_joep}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - GOOGLE_DEVELOPER_TOKEN=${GOOGLE_DEVELOPER_TOKEN}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_LOGIN_CUSTOMER_ID=${GOOGLE_LOGIN_CUSTOMER_ID}
    networks:
      - seo-tools_default
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  seo-tools_default:
    external: true

volumes:
  seo_tools_postgres_data:
    external: true
